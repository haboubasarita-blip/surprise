<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Boy 🎉</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
</head>

<body class="mainPage">

<div class="card">

  <h1 class="title">Happy Birthday Booy 🎉</h1>
  <p class="subtitle">Voulez-vous voir votre cadeau ?</p>

  <!-- Cadeau animé -->
  <div class="giftAnimation">
    <div class="giftBox">
      <div class="lid"></div>
      <div class="box"></div>
    </div>
    <div class="ribbon"></div>
  </div>

  <!-- Image Mickey anniversaire -->
  <div class="birthdayImage">
    <img src="mickey-birthday.png" alt="Mickey Birthday">
  </div>

  <div class="buttons">
    <button class="yesBtn" onclick="location.href='yes.html'">Oui ❤️</button>
    <button class="noBtn" onclick="location.href='no.html'">Non Merci 😒</button>
  </div>

</div>

</body>
</html>
